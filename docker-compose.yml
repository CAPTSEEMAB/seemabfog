version: '3.8'

services:
  localstack:
    image: localstack/localstack:latest
    ports:
      - "4566:4566"
    environment:
      - SERVICES=sqs,dynamodb,s3,apigateway
      - DEBUG=1
    volumes:
      - localstack_data:/var/lib/localstack
    healthcheck:
      # Note: uses localhost because healthcheck runs inside the container
      test: ["CMD-SHELL", "curl -f http://${LOCALSTACK_INTERNAL_HOST:-localhost}:4566/_localstack/health"]
      interval: 5s
      timeout: 3s
      retries: 10

  fog-node-a:
    build:
      context: ./fog
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    env_file: .env
    environment:
      - FOG_PORT=8001
      - FOG_NODE_ID=fog-a
    volumes:
      - ./fog/spool_data_a:/app/spool_data
    depends_on:
      - localstack
    command: python -m uvicorn fog.fog_node:app --host 0.0.0.0 --port 8001

  fog-node-b:
    build:
      context: ./fog
      dockerfile: Dockerfile
    ports:
      - "8002:8002"
    env_file: .env
    environment:
      - FOG_PORT=8002
      - FOG_NODE_ID=fog-b
    volumes:
      - ./fog/spool_data_b:/app/spool_data
    depends_on:
      - localstack
    command: python -m uvicorn fog.fog_node:app --host 0.0.0.0 --port 8002

  sensor-simulator:
    build:
      context: ./sensors
      dockerfile: Dockerfile
    environment:
      - FOG_ENDPOINT_A=http://fog-node-a:8001/ingest
      - FOG_ENDPOINT_B=http://fog-node-b:8002/ingest
    depends_on:
      - fog-node-a
      - fog-node-b
    command: python simulator.py --duration 120

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    ports:
      - "${DASHBOARD_HOST_PORT:-3000}:3000"
    env_file: .env
    depends_on:
      - fog-node-a
      - cloud-consumer

  cloud-consumer:
    build:
      context: ./cloud/local_consumer
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    env_file: .env
    depends_on:
      localstack:
        condition: service_healthy

volumes:
  localstack_data:
