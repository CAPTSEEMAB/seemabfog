services:
  fog-node-a:
    build:
      context: .
      dockerfile: fog/Dockerfile
    ports:
      - "8001:8001"
    env_file: .env
    environment:
      - FOG_PORT=8001
      - FOG_NODE_ID=fog-a
    volumes:
      - ./fog/spool_data_a:/app/spool_data
    command: python -m uvicorn fog.fog_node:app --host 0.0.0.0 --port 8001

  fog-node-b:
    build:
      context: .
      dockerfile: fog/Dockerfile
    ports:
      - "8002:8002"
    env_file: .env
    environment:
      - FOG_PORT=8002
      - FOG_NODE_ID=fog-b
    volumes:
      - ./fog/spool_data_b:/app/spool_data
    command: python -m uvicorn fog.fog_node:app --host 0.0.0.0 --port 8002

  sensor-simulator:
    build:
      context: ./sensors
      dockerfile: Dockerfile
    environment:
      - FOG_ENDPOINT_A=http://fog-node-a:8001/ingest
      - FOG_ENDPOINT_B=http://fog-node-b:8002/ingest
      - USE_REAL_DATA=true
    depends_on:
      - fog-node-a
      - fog-node-b
    command: python simulator.py --duration 1440

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    ports:
      - "${DASHBOARD_HOST_PORT:-3000}:3000"
    env_file: .env
    depends_on:
      - fog-node-a
      - cloud-consumer

  cloud-consumer:
    build:
      context: .
      dockerfile: cloud/local_consumer/Dockerfile
    ports:
      - "5000:5000"
    env_file: .env
